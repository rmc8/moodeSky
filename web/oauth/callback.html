<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodeSky OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Processing OAuth Authentication...</h2>
        <p id="status">Please wait while we complete the authentication process.</p>
    </div>

    <script>
        (function() {
            const statusElement = document.getElementById('status');
            const container = document.querySelector('.container');
            
            try {
                // Parse URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');
                const errorDescription = urlParams.get('error_description');
                
                if (error) {
                    // OAuth error occurred
                    document.querySelector('.spinner').style.display = 'none';
                    container.className = 'container error';
                    document.querySelector('h2').textContent = 'Authentication Failed';
                    statusElement.innerHTML = `<strong>Error:</strong> ${error}<br>${errorDescription || 'Please try again.'}`;
                    
                    // Attempt to communicate error back to the app
                    const errorRedirectAttempts = [
                        () => window.location.href = `https://moodesky.app/oauth/callback?error=${encodeURIComponent(error)}&error_description=${encodeURIComponent(errorDescription || '')}`,
                        () => window.location.href = `com.rmc8.moodesky://oauth/callback?error=${encodeURIComponent(error)}&error_description=${encodeURIComponent(errorDescription || '')}`
                    ];
                    
                    setTimeout(() => {
                        let errorAttemptIndex = 0;
                        const tryErrorRedirect = () => {
                            if (errorAttemptIndex < errorRedirectAttempts.length) {
                                try {
                                    errorRedirectAttempts[errorAttemptIndex]();
                                    errorAttemptIndex++;
                                    if (errorAttemptIndex < errorRedirectAttempts.length) {
                                        setTimeout(tryErrorRedirect, 1000);
                                    }
                                } catch (e) {
                                    errorAttemptIndex++;
                                    setTimeout(tryErrorRedirect, 500);
                                }
                            }
                        };
                        tryErrorRedirect();
                    }, 2000);
                    return;
                }
                
                if (code && state) {
                    // Success - we have an authorization code
                    document.querySelector('.spinner').style.display = 'none';
                    container.className = 'container success';
                    document.querySelector('h2').textContent = 'Authentication Successful!';
                    statusElement.innerHTML = 'Redirecting back to MoodeSky app...';
                    
                    // Platform detection for optimized redirect strategy
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                    const isMacOS = /Macintosh/.test(navigator.userAgent) && !isIOS;
                    const isAndroid = /Android/.test(navigator.userAgent);
                    
                    // Attempt multiple redirect strategies (platform-optimized)
                    let attempts = [];
                    
                    if (isIOS || isMacOS) {
                        // iOS/macOS-optimized redirect order
                        attempts = [
                            // Primary: Universal Link (iOS/macOS preferred)
                            () => window.location.href = `https://moodesky.app/oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                            
                            // Secondary: Custom scheme
                            () => window.location.href = `com.rmc8.moodesky://oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                            
                            // Tertiary: Alternative HTTPS path
                            () => window.location.href = `https://moodesky.app/oauth/success?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                        ];
                    } else if (isAndroid) {
                        // Android-optimized redirect order
                        attempts = [
                            // Primary: Android App Link (HTTPS scheme with manifest intent filter)
                            () => window.location.href = `https://moodesky.app/oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                            
                            // Secondary: Custom scheme for older Android versions
                            () => window.location.href = `com.rmc8.moodesky://oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                            
                            // Tertiary: Android Intent scheme with explicit package
                            () => window.location.href = `intent://oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}#Intent;scheme=com.rmc8.moodesky;package=com.example.moodesky;end`,
                            
                            // Quaternary: Alternative HTTPS path
                            () => window.location.href = `https://moodesky.app/oauth/success?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                        ];
                    } else {
                        // Default/Desktop redirect order
                        attempts = [
                            // Primary: Universal Link
                            () => window.location.href = `https://moodesky.app/oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                            
                            // Secondary: Custom scheme
                            () => window.location.href = `com.rmc8.moodesky://oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                            
                            // Tertiary: Alternative HTTPS path
                            () => window.location.href = `https://moodesky.app/oauth/success?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`,
                        ];
                    }
                    
                    attempts.push(
                        
                        // Fallback: show manual instructions
                        () => {
                            statusElement.innerHTML = `
                                <div class="info">
                                    <strong>Manual Authentication Required</strong><br>
                                    Please copy this authorization code and paste it into the MoodeSky app:<br>
                                    <br>
                                    <code style="background: rgba(255,255,255,0.2); padding: 8px; border-radius: 4px; word-break: break-all;">${code}</code>
                                    <br><br>
                                    State: <code style="background: rgba(255,255,255,0.2); padding: 4px; border-radius: 4px;">${state}</code>
                                </div>
                            `;
                        }
                    ];
                    
                    // Try each redirect method with delays
                    let attemptIndex = 0;
                    const tryNextRedirect = () => {
                        if (attemptIndex < attempts.length) {
                            try {
                                attempts[attemptIndex]();
                                attemptIndex++;
                                if (attemptIndex < attempts.length) {
                                    setTimeout(tryNextRedirect, 2000);
                                }
                            } catch (e) {
                                console.error('Redirect attempt failed:', e);
                                attemptIndex++;
                                setTimeout(tryNextRedirect, 1000);
                            }
                        }
                    };
                    
                    // Start redirect attempts after a short delay
                    setTimeout(tryNextRedirect, 1000);
                    
                } else {
                    // Missing required parameters
                    document.querySelector('.spinner').style.display = 'none';
                    container.className = 'container error';
                    document.querySelector('h2').textContent = 'Invalid Response';
                    statusElement.innerHTML = 'Authorization code not received. Please try again.';
                }
                
            } catch (e) {
                console.error('OAuth callback error:', e);
                document.querySelector('.spinner').style.display = 'none';
                container.className = 'container error';
                document.querySelector('h2').textContent = 'Processing Error';
                statusElement.innerHTML = 'An error occurred while processing the authentication. Please try again.';
            }
        })();
    </script>
</body>
</html>
