<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodeSky OAuth Success</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin: 8px;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .code-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
            word-break: break-all;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h2>Authentication Successful!</h2>
        <p>Your MoodeSky authentication was completed successfully.</p>
        
        <div id="redirectInfo"></div>
        
        <div style="margin-top: 2rem;">
            <a href="com.rmc8.moodesky://oauth/callback" class="btn">Open MoodeSky App</a>
            <br>
            <small style="opacity: 0.8; margin-top: 1rem; display: block;">
                If the app doesn't open automatically, tap the button above.
            </small>
        </div>
    </div>

    <script>
        (function() {
            try {
                // Parse URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');
                
                const redirectInfo = document.getElementById('redirectInfo');
                
                if (error) {
                    document.querySelector('.success-icon').textContent = '❌';
                    document.querySelector('h2').textContent = 'Authentication Failed';
                    document.querySelector('p').textContent = `Error: ${error}`;
                    
                    // Update app link to include error
                    const errorLink = document.querySelector('.btn');
                    errorLink.href = `com.rmc8.moodesky://oauth/callback?error=${encodeURIComponent(error)}`;
                    
                } else if (code && state) {
                    // Show authorization code for manual entry if needed
                    redirectInfo.innerHTML = `
                        <details style="margin: 1rem 0; text-align: left;">
                            <summary style="cursor: pointer; margin-bottom: 0.5rem;">Manual Code Entry</summary>
                            <p style="font-size: 0.9em; margin-bottom: 0.5rem;">If the app doesn't open automatically, you can manually enter this code:</p>
                            <div class="code-box">
                                <strong>Code:</strong> ${code}<br>
                                <strong>State:</strong> ${state}
                            </div>
                        </details>
                    `;
                    
                    // Update app link to include auth data
                    const successLink = document.querySelector('.btn');
                    successLink.href = `com.rmc8.moodesky://oauth/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`;
                    
                    // Try automatic redirect
                    setTimeout(() => {
                        window.location.href = successLink.href;
                    }, 2000);
                }
                
            } catch (e) {
                console.error('OAuth success page error:', e);
            }
        })();
    </script>
</body>
</html>
